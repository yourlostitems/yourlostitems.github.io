name: Post welcome comment
on:
   pull_request:
     types: [opened]
jobs:
  build:
    name: Post welcome comment
    runs-on: ubuntu-latest
    steps:
      - run: gh pr review $PR_URL --comment "Hello, thank you for contributing to this innovative project to help people reunite with their lost items! Sit tight while your pull request is being apporoved!"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
