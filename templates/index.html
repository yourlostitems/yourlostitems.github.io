  <body>

    <div class="w3-container w3-center w3-animate-right" id="ani15">

    <!-- Carousel -->
    <div class="container">
      <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
        <!-- Indicators -->

        <!-- Wrapper for slides -->
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="{{ url_for('static', filename='images/lordoftherings.jpg') }}"
              alt="Lord of the Rings"
              id="img-1"
              class="d-block"
            />
          </div>

          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/size7leathershoes.jpg') }}"
              alt="Size 7 leather shoes"
              id="img-2"
              class="d-block"
            />

          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/greypencilcase.jpg') }}"
              alt="Grey pencil case"
              id="img-3"

            />

          <div class="carousel-item">

              src="{{ url_for('static', filename='images/rugbyjersey.jpg') }}"

              id="img-5"

        </div>

        <!-- Left and right controls -->

          class="carousel-control-prev"
          type="button"

          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#myCarousel"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
        <div class="carousel-indicators">
          <button

            data-bs-slide-to="0"
            class="active"
          ></button>
          <button data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
          <button data-bs-target="#myCarousel" data-bs-slide-to="2"></button>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}" media="print" />
    <script src="" async defer></script>
    <script>
      window.onscroll = function () {
        myFunction();
      };

      var navbar = document.getElementById("navbar");
      var sticky = navbar.offsetTop;

      function myFunction() {
        if (window.pageYOffset >= sticky) {
          navbar.classList.add("sticky");
        } else {
          navbar.classList.remove("sticky");
        }
      }
    </script>
